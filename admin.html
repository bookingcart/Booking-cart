<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookingCart â€” Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { primary: '#14532d', secondary: '#16a34a', muted: '#dcfce7', subtle: '#15803d' }
                }
            }
        }
    </script>
    <style>
        input,
        select,
        button {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async></script>
</head>

<body class="bg-slate-50 text-slate-900 antialiased font-sans flex flex-col min-h-screen">

    <!-- Login -->
    <div id="login-overlay"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center">
            <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="ph-fill ph-lock-key text-green-600 text-2xl"></i>
            </div>
            <h2 class="text-xl font-extrabold text-slate-900 mb-1">Admin Access</h2>
            <p class="text-sm text-slate-500 mb-6">Enter your admin PIN to continue.</p>
            <input id="pin-input" type="password" maxlength="10" placeholder="Enter PIN"
                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-center text-lg font-bold tracking-widest mb-4" />
            <button id="pin-btn"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-all">
                Unlock Dashboard
            </button>
            <p id="pin-error" class="text-red-500 text-sm font-medium mt-3" style="display:none;">Invalid PIN</p>
        </div>
    </div>

    <!-- Ticket Upload Modal -->
    <div id="upload-overlay"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full mx-4 relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeUploadModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600">
                <i class="ph-bold ph-x text-2xl"></i>
            </button>
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 text-xl">
                    <i class="ph-fill ph-upload-simple"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-900">Upload Ticket</h2>
                    <p class="text-sm text-slate-500">Ref: <span id="upload-ref"
                            class="font-bold text-slate-700"></span></p>
                </div>
            </div>

            <div
                class="bg-slate-50 rounded-xl p-4 mb-6 border border-slate-100 flex justify-between items-center text-sm">
                <div>
                    <div class="text-slate-500 font-bold mb-1">Route</div>
                    <div id="upload-route" class="font-medium text-slate-900"></div>
                </div>
                <div class="text-right">
                    <div class="text-slate-500 font-bold mb-1">Passengers</div>
                    <div id="upload-pax" class="font-medium text-slate-900"></div>
                </div>
            </div>

            <form id="upload-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Ticket Number /
                        PNR</label>
                    <input id="ticket-num" required type="text" placeholder="e.g. 1234567890"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Operating
                        Airline</label>
                    <input id="ticket-airline" required type="text" placeholder="e.g. Emirates"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Ticket File (PDF
                        / Image)</label>
                    <input id="ticket-file" required type="file" accept="application/pdf,image/*"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                </div>
                <button type="submit" id="upload-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-600/20 mt-4 flex items-center justify-center gap-2">
                    <i class="ph-bold ph-upload-simple"></i> Upload & Issue Ticket
                </button>
            </form>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-2xl font-extrabold text-slate-900 tracking-tight"><img
                        src="images/logo.png" alt="BookingCart" class="h-10 rounded-xl" /></a>
                <span
                    class="text-xs font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase tracking-wider">Admin</span>
            </div>

            <div id="g_id_onload"
                data-client_id="344110356663-foa7unsastgg0hp57qdaaj5qvmkgd8lg.apps.googleusercontent.com"
                data-context="use" data-ux_mode="popup" data-callback="handleGoogleSignIn" data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with"
                data-size="large" data-logo_alignment="left">
            </div>
            <button id="refresh-btn"
                class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium px-4 py-2 rounded-xl transition-all text-sm">
                <i class="ph ph-arrows-clockwise"></i> Refresh
            </button>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-7 gap-4 mb-8" id="stats">
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Total Bookings</div>
                <div class="text-2xl font-extrabold text-slate-900" id="stat-total">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <div class="text-xs font-bold text-yellow-500 uppercase tracking-wider mb-1">New / Pending</div>
                <div class="text-2xl font-extrabold text-yellow-600" id="stat-new">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <div class="text-xs font-bold text-green-500 uppercase tracking-wider mb-1">Confirmed</div>
                <div class="text-2xl font-extrabold text-green-600" id="stat-confirmed">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <div class="text-xs font-bold text-purple-500 uppercase tracking-wider mb-1">Tickets Issued</div>
                <div class="text-2xl font-extrabold text-purple-600" id="stat-issued">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <div class="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1">Downloads</div>
                <div class="text-2xl font-extrabold text-indigo-600" id="stat-downloads">0</div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Revenue</div>
                <div class="text-2xl font-extrabold text-slate-900" id="stat-revenue">$0</div>
            </div>
            <div class="bg-white rounded-2xl border border-blue-200 p-5">
                <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-1"><i class="ph ph-users"></i>
                    Total Users</div>
                <div class="text-2xl font-extrabold text-blue-600" id="stat-users">0</div>
            </div>
        </div>

        <!-- Filter -->
        <div class="flex items-center gap-3 mb-6">
            <span class="text-sm font-bold text-slate-500">Filter:</span>
            <button class="admin-filter px-3 py-1.5 rounded-lg text-sm font-semibold bg-slate-900 text-white"
                data-filter="all">All</button>
            <button
                class="admin-filter px-3 py-1.5 rounded-lg text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200"
                data-filter="new">New</button>
            <button
                class="admin-filter px-3 py-1.5 rounded-lg text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200"
                data-filter="confirmed">Confirmed</button>
            <button
                class="admin-filter px-3 py-1.5 rounded-lg text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200"
                data-filter="cancelled">Cancelled</button>
        </div>

        <!-- Bookings Table -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm" id="bookings-table">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="text-left px-6 py-4 font-bold text-slate-500 uppercase tracking-wider text-xs">
                                Ref</th>
                            <th class="text-left px-6 py-4 font-bold text-slate-500 uppercase tracking-wider text-xs">
                                Client</th>
                            <th class="text-left px-6 py-4 font-bold text-slate-500 uppercase tracking-wider text-xs">
                                Route</th>
                            <th class="text-left px-6 py-4 font-bold text-slate-500 uppercase tracking-wider text-xs">
                                Date</th>
                            <th class="text-left px-6 py-4 font-bold text-slate-500 uppercase tracking-wider text-xs">
                                Total</th>
                            <th class="text-left px-6 py-4 font-bold text-slate-500 uppercase tracking-wider text-xs">
                                Status</th>
                            <th class="text-right px-6 py-4 font-bold text-slate-500 uppercase tracking-wider text-xs">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-body"></tbody>
                </table>
            </div>
            <div id="empty-state" class="py-16 text-center text-slate-400 font-medium" style="display:none;">
                <i class="ph ph-airplane-tilt text-4xl mb-2"></i>
                <p>No bookings yet.</p>
            </div>
        </div>
    </main>

    <script>
        let adminPin = '';
        let allBookings = [];
        let currentFilter = 'all';

        // â”€â”€ PIN Login â”€â”€
        const overlay = document.getElementById('login-overlay');
        const pinInput = document.getElementById('pin-input');
        const pinBtn = document.getElementById('pin-btn');
        const pinError = document.getElementById('pin-error');

        pinBtn.addEventListener('click', tryLogin);
        pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

        async function tryLogin() {
            adminPin = pinInput.value.trim();
            if (!adminPin) return;
            pinError.style.display = 'none';
            try {
                const resp = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', pin: adminPin })
                });
                const data = await resp.json();
                if (!data.ok) {
                    pinError.textContent = data.error || 'Invalid PIN';
                    pinError.style.display = 'block';
                    return;
                }
                overlay.style.display = 'none';
                allBookings = data.bookings || [];
                renderAll();
            } catch (err) {
                pinError.textContent = 'Error: ' + err.message;
                pinError.style.display = 'block';
            }
        }

        // â”€â”€ Refresh â”€â”€
        document.getElementById('refresh-btn').addEventListener('click', loadBookings);

        async function loadBookings() {
            try {
                const resp = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', pin: adminPin })
                });
                const data = await resp.json();
                if (data.ok) {
                    allBookings = data.bookings || [];
                    renderAll();
                }
            } catch (e) { console.error(e); }
        }

        // â”€â”€ Filters â”€â”€
        document.querySelectorAll('.admin-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                document.querySelectorAll('.admin-filter').forEach(b => {
                    b.className = 'admin-filter px-3 py-1.5 rounded-lg text-sm font-semibold ' +
                        (b.dataset.filter === currentFilter
                            ? 'bg-slate-900 text-white'
                            : 'bg-slate-100 text-slate-600 hover:bg-slate-200');
                });
                renderTable();
            });
        });

        // â”€â”€ Render â”€â”€
        function renderAll() {
            renderStats();
            renderTable();
            loadUserCount();
        }

        async function loadUserCount() {
            try {
                const resp = await fetch('/api/user?action=count&pin=' + encodeURIComponent(adminPin));
                const data = await resp.json();
                if (data.ok) {
                    document.getElementById('stat-users').textContent = data.count || 0;
                }
            } catch (e) { console.error('Failed to load user count:', e); }
        }

        function renderStats() {
            document.getElementById('stat-total').textContent = allBookings.length;
            document.getElementById('stat-new').textContent = allBookings.filter(b => b.status === 'new').length;
            document.getElementById('stat-confirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
            document.getElementById('stat-issued').textContent = allBookings.filter(b => b.status === 'issued').length;

            const totalDownloads = allBookings.reduce((sum, b) => sum + (b.downloadCount || 0), 0);
            document.getElementById('stat-downloads').textContent = totalDownloads;

            const revenue = allBookings
                .filter(b => b.status === 'confirmed' || b.status === 'issued')
                .reduce((sum, b) => sum + (parseFloat(b.total) || 0), 0);
            document.getElementById('stat-revenue').textContent = '$' + Math.round(revenue).toLocaleString();
        }

        function renderTable() {
            const filtered = currentFilter === 'all'
                ? allBookings
                : allBookings.filter(b => b.status === currentFilter);

            const body = document.getElementById('bookings-body');
            const empty = document.getElementById('empty-state');

            if (!filtered.length) {
                body.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            body.innerHTML = filtered.map(b => {
                const statusColors = {
                    new: 'bg-yellow-100 text-yellow-700',
                    confirmed: 'bg-green-100 text-green-700',
                    issued: 'bg-purple-100 text-purple-700',
                    cancelled: 'bg-red-100 text-red-700'
                };
                const badge = statusColors[b.status] || 'bg-slate-100 text-slate-700';
                const email = (b.contact && b.contact.email) || 'â€”';
                const paxCount = (b.passengers && b.passengers.length) || 1;
                const clientContent = `<div>${email}</div><div class="text-xs text-slate-400 mt-0.5">${paxCount} passenger${paxCount > 1 ? 's' : ''}</div>`;
                const total = b.total ? ('$' + b.total) : 'â€”';

                return `
          <tr class="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
            <td class="px-6 py-4 font-bold text-slate-900">${b.ref || 'â€”'}</td>
            <td class="px-6 py-4 text-slate-600">${clientContent}</td>
            <td class="px-6 py-4 font-medium text-slate-700">${b.route || 'â€”'}</td>
            <td class="px-6 py-4 text-slate-600">${b.dates || 'â€”'}</td>
            <td class="px-6 py-4 font-bold text-green-600">${total}</td>
            <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${badge} capitalize">${b.status}</span></td>
            <td class="px-6 py-4 text-right">
              <div class="flex justify-end gap-2">
                ${(b.status === 'confirmed') ? `<button onclick="generateTicketPDF('${b.ref}')" class="px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-200 transition-colors"><i class="ph-bold ph-magic-wand"></i> Generate</button>` : ''}
                ${(b.status === 'confirmed') ? `<button onclick="openUploadModal('${b.ref}')" class="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-200 transition-colors"><i class="ph-bold ph-upload-simple"></i> Upload</button>` : ''}
                ${(b.status === 'issued') ? `<button onclick="generateTicketPDF('${b.ref}')" class="px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-200 transition-colors"><i class="ph-bold ph-magic-wand"></i> Regenerate</button>` : ''}
                ${(b.status === 'issued') ? `<button onclick="openUploadModal('${b.ref}')" class="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-lg text-xs font-bold hover:bg-purple-200 transition-colors"><i class="ph-bold ph-arrows-down-up"></i> Update</button>` : ''}
                ${(b.status !== 'confirmed' && b.status !== 'issued') ? `<button onclick="setStatus('${b.ref}','confirmed')" class="px-3 py-1.5 bg-green-100 text-green-700 rounded-lg text-xs font-bold hover:bg-green-200 transition-colors">Confirm</button>` : ''}
                ${b.status !== 'cancelled' ? `<button onclick="setStatus('${b.ref}','cancelled')" class="px-3 py-1.5 bg-red-100 text-red-700 rounded-lg text-xs font-bold hover:bg-red-200 transition-colors">Cancel</button>` : ''}
              </div>
            </td>
          </tr>`;
            }).join('');
        }

        // â”€â”€ Status Update â”€â”€
        async function setStatus(ref, newStatus) {
            try {
                const resp = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'status', id: ref, status: newStatus, pin: adminPin })
                });
                const data = await resp.json();
                if (data.ok) {
                    await loadBookings();
                } else {
                    alert('Error: ' + (data.error || 'Unknown'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        // ── Ticket Upload ──
        let currentUploadRef = null;

        function openUploadModal(ref) {
            const b = allBookings.find(x => x.ref === ref);
            if (!b) return;
            currentUploadRef = ref;

            document.getElementById('upload-ref').textContent = b.ref;
            document.getElementById('upload-route').textContent = b.route || '—';

            const paxCount = (b.passengers && b.passengers.length) || 1;
            const paxName = (b.passengers && b.passengers[0]) ? ((b.passengers[0].firstName || '') + ' ' + (b.passengers[0].lastName || '')).trim().toUpperCase() : (b.contact && b.contact.email ? b.contact.email.split('@')[0].toUpperCase() : 'PASSENGER');
            document.getElementById('upload-pax').innerHTML = `<div>${paxName}</div><div class="text-xs text-slate-500 mt-0.5">${paxCount} traveler${paxCount > 1 ? 's' : ''}</div>`;

            document.getElementById('upload-overlay').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('upload-overlay').style.display = 'none';
            document.getElementById('upload-form').reset();
            currentUploadRef = null;
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUploadRef) return;

            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="ph-bold ph-circle-notch animate-spin"></i> Uploading...';

            try {
                const fileInput = document.getElementById('ticket-file');
                const file = fileInput.files[0];
                if (!file) throw new Error("Please select a file.");

                // Read file to Base64
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64String = reader.result;

                    const ticketData = {
                        ticketNumber: document.getElementById('ticket-num').value.trim(),
                        airline: document.getElementById('ticket-airline').value.trim(),
                        fileName: file.name,
                        fileData: base64String, // The Base64 encoded payload
                        issuedAt: new Date().toISOString()
                    };

                    const resp = await fetch('/api/bookings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'upload_ticket',
                            id: currentUploadRef,
                            ticket: ticketData,
                            pin: adminPin
                        })
                    });

                    const data = await resp.json();
                    if (data.ok) {
                        alert('âœ… Ticket successfully issued!\n\nAn automated email notification has been dispatched to the customer.');
                        closeUploadModal();
                        await loadBookings();
                    } else {
                        alert('Error: ' + (data.error || 'Upload failed'));
                    }

                    btn.disabled = false;
                    btn.innerHTML = '<i class="ph-bold ph-upload-simple"></i> Upload & Issue Ticket';
                };
                reader.readAsDataURL(file);

            } catch (err) {
                alert('Error: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="ph-bold ph-upload-simple"></i> Upload & Issue Ticket';
            }
        });

        // ── Auto Ticket Generation ──
        async function generateTicketPDF(ref) {
            const b = allBookings.find(x => x.ref === ref);
            if (!b) return;

            if (!confirm('Auto-generate and issue an e-ticket for ' + ref + '?')) return;

            try {
                // Initialize jsPDF
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

                // Colors & Fonts
                const primaryColor = [20, 83, 45]; // #14532d (Tailwind primary)
                const secondaryColor = [22, 163, 74]; // #16a34a
                const slate800 = [30, 41, 59];
                const slate500 = [100, 116, 139];
                const slate200 = [226, 232, 240];

                // Data Extraction
                const routeParts = (b.route || '').split(' → ');
                const origin = routeParts[0] || 'Origin';
                const dest = routeParts[1] || 'Destination';
                const dateParts = (b.dates || '').split(' → ');
                const depDate = dateParts[0] || 'TBD';
                const arrDate = dateParts[1] || depDate;

                const timeParts = (b.flight && b.flight.time) ? b.flight.time.split(' → ') : [];
                const depTime = timeParts[0] || '08:00 AM';
                const arrTime = timeParts[1] || '12:00 PM';

                const airline = (b.flight && b.flight.airline) ? b.flight.airline : 'Global Air';
                const pnr = b.ref || 'ABC123';
                const ticketNum = 'TKT-' + Math.floor(100000000 + Math.random() * 900000000);

                const paxName = (b.passengers && b.passengers[0]) ? ((b.passengers[0].firstName || '') + ' ' + (b.passengers[0].lastName || '')).trim().toUpperCase() : (b.contact && b.contact.email ? b.contact.email.split('@')[0].toUpperCase() : 'GUEST');

                // Header Background
                doc.setFillColor(...primaryColor);
                doc.rect(0, 0, 210, 40, 'F');

                doc.setTextColor(255, 255, 255);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(28);
                doc.text("E-TICKET", 20, 26);

                doc.setFont("helvetica", "normal");
                doc.setFontSize(12);
                doc.text("Booking Reference: " + pnr, 130, 26);

                // Passenger Box
                doc.setFillColor(248, 250, 252);
                doc.setDrawColor(...slate200);
                doc.roundedRect(20, 50, 170, 30, 3, 3, 'FD');

                doc.setTextColor(...slate500);
                doc.setFontSize(10);
                doc.text("PASSENGER NAME", 25, 60);
                doc.text("TICKET NUMBER", 100, 60);
                doc.text("ISSUED ON", 150, 60);

                doc.setTextColor(...slate800);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(14);
                doc.text(paxName, 25, 70);
                doc.setFontSize(12);
                doc.text(ticketNum, 100, 70);
                doc.text(new Date().toISOString().split('T')[0], 150, 70);

                // Flight Box
                doc.setFillColor(255, 255, 255);
                doc.roundedRect(20, 90, 170, 70, 3, 3, 'FD');

                doc.setTextColor(...slate800);
                doc.setFontSize(14);
                doc.text("FLIGHT ITINERARY", 25, 102);

                doc.setDrawColor(...slate200);
                doc.line(20, 108, 190, 108);

                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);
                doc.setTextColor(...slate500);
                doc.text("DEPARTURE", 25, 120);
                doc.text("ARRIVAL", 100, 120);
                doc.text("FLIGHT", 150, 120);

                doc.setTextColor(...slate800);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(20);
                doc.text(origin, 25, 132);
                doc.text(dest, 100, 132);

                doc.setFontSize(12);
                doc.text(airline, 150, 130);
                doc.setFont("helvetica", "normal");
                doc.text("Class: Economy", 150, 138);

                doc.setFont("helvetica", "normal");
                doc.setFontSize(12);
                doc.setTextColor(...slate500);
                doc.text(`${depDate} at ${depTime}`, 25, 142);
                doc.text(`${arrDate} at ${arrTime}`, 100, 142);

                // Baggage
                doc.setFillColor(248, 250, 252);
                doc.roundedRect(20, 170, 170, 25, 3, 3, 'FD');
                doc.setFontSize(10);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(...slate800);
                doc.text("BAGGAGE ALLOWANCE: 1x 23kg Checked, 1x 7kg Cabin", 25, 184);

                // Bottom Terms
                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(...slate500);
                const terms = "This is an electronically generated ticket. Please present this document along with a valid photo ID at the check-in counter. Ensure you arrive at the airport at least 2 hours before the scheduled departure time.";
                doc.text(terms, 20, 210, { maxWidth: 170 });

                // Generate QR code invisibly to get base64
                const qrContainer = document.createElement("div");
                new QRCode(qrContainer, {
                    text: `PNR:${pnr}|TKT:${ticketNum}|PAX:${paxName}`,
                    width: 128,
                    height: 128
                });

                // Wait for QRCode to render to canvas
                setTimeout(async () => {
                    const canvas = qrContainer.querySelector('canvas');
                    if (canvas) {
                        const qrDataUrl = canvas.toDataURL("image/png");
                        doc.addImage(qrDataUrl, 'PNG', 150, 220, 40, 40);
                    }

                    // Convert PDF to Base64 String
                    const pdfBase64 = doc.output('datauristring');

                    // Post to API
                    const ticketData = {
                        ticketNumber: ticketNum,
                        airline: airline,
                        fileName: pnr + '-E-Ticket.pdf',
                        fileData: pdfBase64,
                        issuedAt: new Date().toISOString()
                    };

                    const resp = await fetch('/api/bookings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'upload_ticket',
                            id: pnr,
                            ticket: ticketData,
                            pin: adminPin
                        })
                    });

                    const data = await resp.json();
                    if (data.ok) {
                        alert('✅ Ticket successfully auto-generated and issued!\n\nEmail dispatched.');
                        await loadBookings();
                    } else {
                        alert('Error saving ticket: ' + (data.error || 'Unknown'));
                    }
                }, 100);

            } catch (err) {
                console.error(err);
                alert("Generation error: " + err.message);
            }
        }
    </script>
    <script src="js/auth.js"></script>
</body>

</html>
