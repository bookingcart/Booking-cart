<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookingCart — My Bookings</title>
    <meta name="description" content="View your flight bookings." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { primary: '#14532d', secondary: '#16a34a', muted: '#dcfce7', subtle: '#15803d' }
                }
            }
        }
    </script>
    <style>
        input,
        button {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased font-sans flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold text-slate-900 tracking-tight">BookingCart</a>
            <nav class="hidden lg:flex items-center gap-6 text-sm font-semibold text-slate-500">
                <a href="index.html" class="hover:text-green-600 transition-colors">Flights</a>
                <a href="my-bookings.html" class="text-green-600">My Bookings</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-12 max-w-3xl">
        <!-- Lookup Form -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">My Bookings</h1>
            <p class="text-slate-500 font-medium">Enter your email to view your bookings.</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-8">
            <div class="flex gap-3">
                <div class="flex-1 relative">
                    <i class="ph ph-envelope absolute left-4 top-3.5 text-slate-400 text-xl"></i>
                    <input id="lookup-email" type="email" placeholder="Your email address"
                        class="w-full bg-slate-50 border-none rounded-xl p-3 pl-12 text-sm font-semibold" />
                </div>
                <button id="lookup-btn"
                    class="bg-green-600 hover:bg-green-700 text-white font-bold px-6 rounded-xl transition-all flex items-center gap-2">
                    <i class="ph ph-magnifying-glass"></i> Find
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="bookings-status" class="text-center text-slate-400 font-medium py-8" style="display:none;"></div>
        <div id="bookings-list" class="space-y-4"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 py-8">
        <div
            class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-medium text-slate-400">
            <div>&copy; 2026 BookingCart. All rights reserved.</div>
            <div class="flex gap-6">
                <a href="privacy.html" class="hover:text-slate-600">Privacy Policy</a>
                <a href="terms.html" class="hover:text-slate-600">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script>
        const emailInput = document.getElementById('lookup-email');
        const lookupBtn = document.getElementById('lookup-btn');
        const statusEl = document.getElementById('bookings-status');
        const listEl = document.getElementById('bookings-list');

        lookupBtn.addEventListener('click', lookup);
        emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

        async function lookup() {
            const email = emailInput.value.trim();
            if (!email) return;
            statusEl.style.display = 'block';
            statusEl.textContent = 'Searching...';
            listEl.innerHTML = '';

            try {
                const resp = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'lookup', email })
                });
                const data = await resp.json();
                if (!data.ok || !data.bookings.length) {
                    statusEl.textContent = 'No bookings found for this email.';
                    return;
                }
                statusEl.style.display = 'none';
                listEl.innerHTML = data.bookings.map(b => bookingCard(b)).join('');
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
            }
        }

        function bookingCard(b) {
            const statusColors = {
                new: 'bg-yellow-100 text-yellow-700',
                confirmed: 'bg-green-100 text-green-700',
                cancelled: 'bg-red-100 text-red-700'
            };
            const badge = statusColors[b.status] || 'bg-slate-100 text-slate-700';
            const route = b.route || '—';
            const dates = b.dates || '—';
            const airline = (b.flight && b.flight.airline) || '—';
            const total = b.total ? ('$' + b.total) : '—';

            return `
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
          <div class="flex items-start justify-between mb-3">
            <div>
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Booking Ref</span>
              <div class="text-lg font-extrabold text-slate-900">${b.ref || '—'}</div>
            </div>
            <span class="px-3 py-1 rounded-full text-xs font-bold ${badge} capitalize">${b.status || 'new'}</span>
          </div>
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div>
              <span class="text-slate-400 font-medium block">Route</span>
              <span class="font-semibold text-slate-900">${route}</span>
            </div>
            <div>
              <span class="text-slate-400 font-medium block">Dates</span>
              <span class="font-semibold text-slate-900">${dates}</span>
            </div>
            <div>
              <span class="text-slate-400 font-medium block">Airline</span>
              <span class="font-semibold text-slate-900">${airline}</span>
            </div>
            <div>
              <span class="text-slate-400 font-medium block">Total</span>
              <span class="font-extrabold text-green-600">${total}</span>
            </div>
          </div>
          <div class="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-400">
            Booked on ${b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '—'}
          </div>
        </div>`;
        }
    </script>
</body>

</html>
